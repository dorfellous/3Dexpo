name: Apply Codex live fix

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-live-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Apply verified patch
        run: |
          cat > /tmp/3dexpo-live-fix.patch.gz.b64 <<'PATCH_B64'

PATCH_B64
          base64 -d /tmp/3dexpo-live-fix.patch.gz.b64 | gzip -d > /tmp/3dexpo-live-fix.patch
          git apply /tmp/3dexpo-live-fix.patch
          rm -f .github/workflows/apply-live-fix.yml

      - name: Verify build
        run: |
          npm ci
          npm run build

      - name: Commit applied fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix product loading and environment materials editor"
          git push
