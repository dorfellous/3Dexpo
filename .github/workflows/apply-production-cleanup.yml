name: Apply production cleanup

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/apply-production-cleanup.yml

permissions:
  contents: write

jobs:
  apply-cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply cleanup patch
        run: |
          cat > /tmp/cleanup.patch.xz.b64 <<'PATCH_B64'


PATCH_B64
          base64 -d /tmp/cleanup.patch.xz.b64 > /tmp/cleanup.patch.xz
          xz -d -c /tmp/cleanup.patch.xz > /tmp/cleanup.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git am /tmp/cleanup.patch

      - name: Verify build
        run: |
          npm ci
          npm run build

      - name: Remove temporary workflow and push
        run: |
          rm .github/workflows/apply-production-cleanup.yml
          git add -A
          git commit --amend --no-edit
          git push origin HEAD:main
