name: Run Codex live fix

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-live-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Apply stored patch
        shell: bash
        run: |
          awk '/PATCH_B64/{flag=!flag; next} flag {print}' .github/workflows/apply-live-fix.yml > /tmp/3dexpo-live-fix.patch.gz.b64
          base64 -d /tmp/3dexpo-live-fix.patch.gz.b64 | gzip -d > /tmp/3dexpo-live-fix.patch
          git apply /tmp/3dexpo-live-fix.patch
          rm -f .github/workflows/apply-live-fix.yml .github/workflows/run-live-fix.yml

      - name: Verify build
        run: |
          npm ci
          npm run build

      - name: Commit applied fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix product loading and environment materials editor"
          git push
